<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A(See(n)see)Z</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<style>
:root {
    --sense-green: #b2f2bb;
    --sense-blue: #90e0ef;
    --sense-red: #cc7a7a;
}
html, body {
    height: 100%;
    margin: 0;
    background: #000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
#vanta-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.35;
    filter: saturate(140%) contrast(115%);
    pointer-events: none;
}
#particles-stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}
/* Main content */
.main-content {
    position: relative;
    z-index: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.toggle-btn {
    margin-top: 33px;
    padding: 10px 25px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--sense-green);
    color: var(--sense-green);
    font-family: inherit;
    cursor: pointer;
    backdrop-filter: blur(5px);
    transition: 0.3s;
    letter-spacing: 2px;
    z-index: 100;
}

.toggle-btn:hover {
    background: var(--sense-green);
    color: #000;
    box-shadow: 0 0 20px var(--sense-green);
}

/* Title */
.title {
    margin-bottom: 30px;
    font-size: 36px;
    letter-spacing: 12px;
    color: #fff;
    font-weight: 300;
    text-shadow: 0 0 10px rgba(178,242,187,0.7),
                 0 0 20px rgba(178,242,187,0.4);
    transition: 3s ease;
}
.scene {
    perspective: 1448px;
}
.glow-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 448px;  
    height: 440px;
    border-radius: 50%;
    border: 2px solid rgba(178,242,187,0.5);
    box-shadow: 0 0 20px rgba(178,242,187,0.8),
                0 0 40px rgba(178,242,187,0.6),
                0 0 60px rgba(178,242,187,0.4);
    transform: translate(-50%, -50%) rotate(0deg);
    pointer-events: none;
    animation: slow-spin 25s linear infinite, pulse-glow 3s ease-in-out infinite;
}


@keyframes slow-spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(178,242,187,0.8),
                        0 0 40px rgba(178,242,187,0.6),
                        0 0 60px rgba(178,242,187,0.4); }
    50%      { box-shadow: 0 0 35px rgba(178,242,187,1),
                        0 0 60px rgba(178,242,187,0.8),
                        0 0 90px rgba(178,242,187,0.6); }
}
/* Clock */
.clock-container {
    transform-style: preserve-3d;
    transition: transform 0.15s ease-out;
    will-change: transform;
    position: relative;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 2px solid rgba(200, 170, 90, 0.38);
    box-shadow:
        0 0 30px rgba(210, 170, 80, 0.12),
        0 0 55px rgba(0, 0, 0, 0.65),
        inset 0 0 18px rgba(0, 0, 0, 0.6),
        inset 0 0 5px rgba(210, 170, 80, 0.2);
}

.glass-cover {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    box-shadow: inset 0 20px 60px rgba(255,255,255,0.15), 
                0 0 40px rgba(255,255,255,0.1);
    backdrop-filter: blur(4px); 
    pointer-events: none;
    transform: translateZ(30px);
}
/* Hidden core text */
.clock-container::after {
    content: '81 18';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 27px;
    letter-spacing: 3px;
    color: #000;
    text-shadow: 0 0 7px #00ff88;
}
/* Brand */
.brand-name {
    position: absolute;
    top: 63%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--sense-green);
    font-size: 13px;
    letter-spacing: 7px;
    opacity: 0.6;
    text-transform: uppercase;
}
/* Center pulse */
.center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 3px;
    height: 6px;
    background: var(--sense-green);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 1.448s ease-in-out infinite;
    box-shadow: 0 0 27px rgba(178,242,187,0.9);
    z-index: 10;
}
@keyframes pulse {
    0%,100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
    50% { transform: translate(-50%, -50%) scale(1.7); opacity: 0.4; }
}
/* Numbers */
.number {
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    padding: 20px;
    box-sizing: border-box;
    color: #f1f5f9;
}
.n12{transform:rotate(0)}
.n1{transform:rotate(-30deg)} .n1 div{transform:rotate(30deg)}
.n2{transform:rotate(-60deg)} .n2 div{transform:rotate(60deg)}
.n3{transform:rotate(-90deg)} .n3 div{transform:rotate(90deg)}
.n4{transform:rotate(-120deg)} .n4 div{transform:rotate(120deg)}
.n5{transform:rotate(-150deg)} .n5 div{transform:rotate(150deg)}
.nƐ3{transform:rotate(-180deg)} .nƐ3 div{transform:rotate(180deg)}
.n7{transform:rotate(-210deg)} .n7 div{transform:rotate(210deg)}
.n8{transform:rotate(-240deg)} .n8 div{transform:rotate(240deg)}
.n9{transform:rotate(-270deg)} .n9 div{transform:rotate(270deg)}
.n10{transform:rotate(-300deg)} .n10 div{transform:rotate(300deg)}
.n11{transform:rotate(-330deg)} .n11 div{transform:rotate(330deg)}
/* Hands */
.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    border-radius: 10px;
    transform: translateZ(20px);
}
.hour {
    width: 6px;
    height: 100px;
    background: rgba(241,245,249,0.25);
    box-shadow: 0 0 10px rgba(241,245,249,0.3); 
}
.minute {
    width: 4px;
    height: 140px;
    background: var(--sense-red);
    box-shadow: 0 0 11px var(--sense-red); 
}
.second {
    width: 2px;
    height: 160px;
    background: var(--sense-blue);
    box-shadow: 0 0 12px var(--sense-blue);
}/* Tagline */
.tagline {
    margin-top: 33px;      
    color: #fff;            
    opacity: 0.85;         
    font-size: 14px;        
    letter-spacing: 2px;   
    text-align: center;    
    width: 100%;        
}

/* Mobile */
@media (max-width:600px){
    .clock-container { width:260px; height:260px; }
    .title { font-size:24px; letter-spacing:8px; }
    .number { font-size:16px; }
}

body {
    opacity: 0;
    transition: opacity 3s ease-in;
}

body.loaded {
    opacity: 1;
}

</style>
</head>
<body>
<div id="vanta-bg"></div> 
<div id="particles-stars"></div>
<div id="particles-movement"></div>
<div class="main-content">
    <div class="scene">
    <div class="glow-ring"></div>
    <div class="clock-container">
        <div class="glass-cover"></div>
        <div class="brand-name">Seensee</div>
        <div class="center-dot"></div>
        <div class="number n)("><div>1</div></div>
        <div class="number n1"><div>2</div></div>
        <div class="number n2"><div>3</div></div>
        <div class="number n3"><div>4</div></div>
        <div class="number n4"><div>5</div></div>
        <div class="number n5"><div>6</div></div>
        <div class="number nƐ3"><div>7</div></div>
        <div class="number n7"><div>8</div></div>
        <div class="number n8"><div>9</div></div>
        <div class="number n9"><div>10</div></div>
        <div class="number n10"><div>11</div></div>
        <div class="number n11"><div>12</div></div>
        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>
    </div>
    <div class="tagline">The instinct of Sensation</div>
</div>
<script>
/* Smooth clock */
function updateClock() {
    const now = new Date();
    const ms = now.getMilliseconds();
    const s = now.getSeconds() + ms / 1000;
    const m = now.getMinutes() + s / 60;
    const h = (now.getHours() % 12) + m / 60;
    second.style.transform = `translateX(-50%) rotate(${-s*6}deg)`;
    minute.style.transform = `translateX(-50%) rotate(${-m*6}deg)`;
    hour.style.transform   = `translateX(-50%) rotate(${-h*30}deg)`;
    requestAnimationFrame(updateClock);
}
updateClock();
/* Idle interaction */
let idle;
function resetIdle(){
    clearTimeout(idle);
    document.body.classList.remove('idle');
    idle = setTimeout(()=>document.body.classList.add('idle'),10000);
}
['mousemove','touchstart','keydown'].forEach(e =>
    document.addEventListener(e, resetIdle)
);
resetIdle();
const toggleBtn = document.getElementById('toggle-btn');
let isArabic = false;

const langData = {
    latin: [")(", "1", "2", "3", "4", "5", "Ɛ3", "7", "8", "9", "10", "11"],
    arabic: [")(", "١", "٢", "٣", "٤", "٥", "٦", "٧", "٨", "٩", "١٠", "١١"]
};

toggleBtn.addEventListener('click', () => {
    isArabic = !isArabic;
    const currentLang = isArabic ? langData.arabic : langData.latin;
    const nums = document.querySelectorAll('.number div');
    
    nums.forEach((num, i) => {
        num.style.opacity = '0';
        setTimeout(() => {
            num.innerText = currentLang[i];
            
            if (i === 6) {
                num.style.transform = "scaleX(-1)";
            } else {
                num.style.transform = "scaleX(1)";
            }
            
            num.style.opacity = '1';
        }, 200);
    });

    toggleBtn.innerText = isArabic ? "SWITCH TO LATIN EDITION" : "SWITCH TO ARABIC EDITION";
});

</script>
<script>
VANTA.FOG({
    el: "#vanta-bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200.0,
    minWidth: 200.0,
    highlightColor: 0x90e0ef,
    midtoneColor: 0xb2f2bb,
    lowlightColor: 0x0b132b,
    baseColor: 0x000000,
    blurFactor: 0.14,
    speed: 0.4,
    zoom: 1.15
});
particlesJS("particles-stars", {
    particles: {
        number: { value: 72, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        opacity: { 
            value: 0.6, 
            random: true,
            anim: { enable: true, speed: 2.5, opacity_min: 0.2, sync: false }
        },
        size: { 
            value: 1.5, 
            random: true,
            anim: { enable: true, speed: 2, size_min: 0.5, sync: false }
        },
        move: { enable: true, speed: 0.2, direction: "none", random: true },
        line_linked: { enable: false }
    },
    retina_detect: true
});
</script>
<script>
window.addEventListener('load', () => {
    document.body.classList.add('loaded');
});
</script>
<script>
const clock = document.querySelector('.clock-container');
const scene = document.querySelector('.scene');
let currentX = 0;
let currentY = 0;
let targetX = 0;
let targetY = 0;
scene.addEventListener('mousemove', (e) => {
    const rect = scene.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    targetY = (x - centerX) / centerX * 5; 
    targetX = -(y - centerY) / centerY * 6; 
});

scene.addEventListener('mouseleave', () => {
    targetX = 0;
    targetY = 0;
});

function animate3D() {
    currentX += (targetX - currentX) * 0.7;
    currentY += (targetY - currentY) * 0.8;

    clock.style.transform = `
        rotateX(${currentX}deg)
        rotateY(${currentY}deg)
    `;
clock.style.filter = `
    drop-shadow(${currentY}px ${currentX*2}px 60px rgba(0,0,0,0.6))
`;
    requestAnimationFrame(animate3D);
}
animate3D();

let touchX = 0;
let touchY = 0;

scene.addEventListener('touchstart', e => {
    const t = e.touches[0];
    touchX = t.clientX;
    touchY = t.clientY;
});

scene.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const dx = t.clientX - touchX;
    const dy = t.clientY - touchY;

    targetY = dx * 0.11;
    targetX = -dy * 0.10;
});
</script>
<script>
const clock = document.querySelector('.clock-container');
const btn = document.getElementById('enable-gyro');
let gyroX = 0;
let gyroY = 0;
function handleOrientation(event) {
    const beta = event.beta;  
    const gamma = event.gamma; 
gyroX = Math.max(-15, Math.min(15, gyroX));
gyroY = Math.max(-15, Math.min(15, gyroY));
    clock.style.transform = `
        rotateX(${-gyroX}deg)
        rotateY(${gyroY}deg)
    `;
}

btn.addEventListener('click', () => {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
                if (permissionState === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                    btn.style.display = 'none';
                }
            });
    } else {
        window.addEventListener('deviceorientation', handleOrientation);
        btn.style.display = 'none';
    }
});
</script>
</body>
</html>
