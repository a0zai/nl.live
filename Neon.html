<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEENSEE | Clock Design</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #050505; /* خلفية سوداء عميقة */
            overflow: hidden;
        }
        .clock-container {
            width: 90%;
            max-width: 600px;
            filter: drop-shadow(0 0 20px rgba(0, 204, 136, 0.1)); /* توهج خفيف جداً */
        }
        svg {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
          <circle cx="250" cy="250" r="240" fill="black" stroke="#2a2a2a" stroke-width="2"/>
          <circle cx="250" cy="250" r="4" fill="#f2f2f2"/>
          <text x="250" y="232" font-family="Courier New, monospace" font-size="22" fill="#00cc88" text-anchor="middle" letter-spacing="3">81 18</text>
          <text x="250" y="318" font-family="Courier New, monospace" font-size="11" fill="#b2f2bb" text-anchor="middle" letter-spacing="5" opacity="0.55">SEENSEE</text>
          <g font-family="Courier New, monospace" font-size="32" font-weight="bold" fill="#f2f2f2" text-anchor="middle">
            <text x="250" y="70">1</text>
            <text transform="translate(250,250) rotate(-30)  translate(0,-185) rotate(30)">12</text>
            <text transform="translate(250,250) rotate(-60)  translate(0,-185) rotate(60)">11</text>
            <text transform="translate(250,250) rotate(-90)  translate(0,-185) rotate(90)">10</text>
            <text transform="translate(250,250) rotate(-120) translate(0,-185) rotate(120)">9</text>
            <text transform="translate(250,250) rotate(-150) translate(0,-185) rotate(150)">8</text>
            <text transform="translate(250,250) rotate(-180) translate(0,-185) rotate(180)">7</text>
            <text transform="translate(250,250) rotate(-210) translate(0,-185) rotate(210)">6</text>
            <text transform="translate(250,250) rotate(-240) translate(0,-185) rotate(240)">5</text>
            <text transform="translate(250,250) rotate(-270) translate(0,-185) rotate(270)">4</text>
            <text transform="translate(250,250) rotate(-300) translate(0,-185) rotate(300)">3</text>
            <text transform="translate(250,250) rotate(-330) translate(0,-185) rotate(330)">2</text>
          </g>
        </svg>
    </div>

</body>
</html>
