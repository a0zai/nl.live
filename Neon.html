<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>A(See(n)see)Z</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<style>
:root {
    --sense-green: #b2f2bb;
    --sense-blue: #90e0ef;
    --sense-red: #cc7a7a;
}
html, body {
    height: 100%;
    margin: 0;
    background: #000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
#vanta-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.35;
    filter: saturate(140%) contrast(115%);
    pointer-events: none;
}
#particles-stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}
.main-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.scene {
    perspective: 1448px;
    position: relative;
}
.energy-cloud {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 550px;
    height: 550px;
    z-index: -1;
    background: radial-gradient(circle, rgba(178,242,187,0.4) 0%, transparent 70%);
    filter: blur(20px);
}
.energy-cloud::before, .energy-cloud::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.015' numOctaves='3' /%3E%3CfeColorMatrix values='0 0 0 0 0.69 0 0 0 0 0.95 0 0 0 0 0.73 0 0 0 1 0' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)' /%3E%3C/svg%3E");
    opacity: 0.5;
    mask-image: radial-gradient(circle, black 30%, transparent 65%);
    -webkit-mask-image: radial-gradient(circle, black 30%, transparent 65%);
    animation: drift 15s linear infinite;
}
.energy-cloud::after {
    animation: drift 25s linear infinite reverse;
    opacity: 0.3;
    scale: 1.2;
}
@keyframes drift {
    from { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.1); }
    to { transform: rotate(360deg) scale(1); }
}
.clock-container {
    transform-style: preserve-3d;
    transition: transform 0.15s ease-out;
    will-change: transform;
    position: relative;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 2px solid rgba(200, 170, 90, 0.38);
    background: rgba(0,0,0,0.85);
    box-shadow:
        0 0 30px rgba(0, 0, 0, 0.9),
        inset 0 0 20px rgba(0, 0, 0, 0.8);
}
.glass-cover {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
    box-shadow: inset 0 20px 60px rgba(255,255,255,0.1), 
                0 0 40px rgba(255,255,255,0.05);
    backdrop-filter: blur(2px); 
    pointer-events: none;
    transform: translateZ(30px);
}
.clock-container::after {
    content: '81 18';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 27px;
    letter-spacing: 3px;
    color: #1a1a1a;
    text-shadow: 0 0 5px rgba(0, 255, 136, 0.4);
}
.brand-name {
    position: absolute;
    top: 63%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--sense-green);
    font-size: 13px;
    letter-spacing: 7px;
    opacity: 0.6;
    text-transform: uppercase;
}
.center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 3px;
    height: 6px;
    background: var(--sense-green);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 1.448s ease-in-out infinite;
    box-shadow: 0 0 27px rgba(178,242,187,0.9);
    z-index: 10;
}
@keyframes pulse {
    0%,100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
    50% { transform: translate(-50%, -50%) scale(1.7); opacity: 0.4; }
}
.number {
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    padding: 20px;
    box-sizing: border-box;
    color: #f1f5f9;
}
.n12{transform:rotate(0)}
.n1{transform:rotate(-30deg)} .n1 div{transform:rotate(30deg)}
.n2{transform:rotate(-60deg)} .n2 div{transform:rotate(60deg)}
.n3{transform:rotate(-90deg)} .n3 div{transform:rotate(90deg)}
.n4{transform:rotate(-120deg)} .n4 div{transform:rotate(120deg)}
.n5{transform:rotate(-150deg)} .n5 div{transform:rotate(150deg)}
.nƐ3{transform:rotate(-180deg)} .nƐ3 div{transform:rotate(180deg)}
.n7{transform:rotate(-210deg)} .n7 div{transform:rotate(210deg)}
.n8{transform:rotate(-240deg)} .n8 div{transform:rotate(240deg)}
.n9{transform:rotate(-270deg)} .n9 div{transform:rotate(270deg)}
.n10{transform:rotate(-300deg)} .n10 div{transform:rotate(300deg)}
.n11{transform:rotate(-330deg)} .n11 div{transform:rotate(330deg)}
.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    border-radius: 10px;
    transform: translateZ(20px);
}
.hour {
    width: 6px;
    height: 100px;
    background: rgba(241,245,249,0.25);
    box-shadow: 0 0 10px rgba(241,245,249,0.3); 
}
.minute {
    width: 4px;
    height: 140px;
    background: var(--sense-red);
    box-shadow: 0 0 11px var(--sense-red); 
}
.second {
    width: 2px;
    height: 160px;
    background: var(--sense-blue);
    box-shadow: 0 0 12px var(--sense-blue);
}
.tagline {
    margin-top: 33px;      
    color: #fff;            
    opacity: 0.85;         
    font-size: 14px;        
    letter-spacing: 2px;   
    text-align: center;    
    width: 100%;        
}
@media (max-width:600px){
    .clock-container { width:260px; height:260px; }
    .energy-cloud { width: 350px; height: 350px; }
    .number { font-size:16px; }
}
body {
    opacity: 0;
    transition: opacity 2s ease-in;
}
body.loaded {
    opacity: 1;
}
</style>
</head>
<body>
<div id="vanta-bg"></div> 
<div id="particles-stars"></div>
<div class="main-content">
    <div class="scene">
        <div class="energy-cloud"></div>
        <div class="clock-container">
            <div class="glass-cover"></div>
            <div class="brand-name">Seensee</div>
            <div class="center-dot"></div>
            <div class="number n)("><div>1</div></div>
            <div class="number n1"><div>2</div></div>
            <div class="number n2"><div>3</div></div>
            <div class="number n3"><div>4</div></div>
            <div class="number n4"><div>5</div></div>
            <div class="number n5"><div>6</div></div>
            <div class="number nƐ3"><div>7</div></div>
            <div class="number n7"><div>8</div></div>
            <div class="number n8"><div>9</div></div>
            <div class="number n9"><div>10</div></div>
            <div class="number n10"><div>11</div></div>
            <div class="number n11"><div>12</div></div>
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
        </div>
    </div>
    <div class="tagline">The instinct of Sensation</div>
</div>
<script>
function updateClock() {
    const now = new Date();
    const ms = now.getMilliseconds();
    const s = now.getSeconds() + ms / 1000;
    const m = now.getMinutes() + s / 60;
    const h = (now.getHours() % 12) + m / 60;
    document.getElementById('second').style.transform = `translateX(-50%) rotate(${-s*6}deg)`;
    document.getElementById('minute').style.transform = `translateX(-50%) rotate(${-m*6}deg)`;
    document.getElementById('hour').style.transform   = `translateX(-50%) rotate(${-h*30}deg)`;
    requestAnimationFrame(updateClock);
}
updateClock();

VANTA.FOG({
    el: "#vanta-bg",
    highlightColor: 0x90e0ef,
    midtoneColor: 0xb2f2bb,
    lowlightColor: 0x0b132b,
    baseColor: 0x000000,
    blurFactor: 0.24,
    speed: 0.4,
    zoom: 1.14
});

particlesJS("particles-stars", {
    particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        opacity: { value: 0.4, random: true },
        size: { value: 1.2, random: true },
        move: { enable: true, speed: 0.1, direction: "none", random: true },
        line_linked: { enable: false }
    }
});

window.addEventListener('load', () => { document.body.classList.add('loaded'); });

const clock = document.querySelector('.clock-container');
const scene = document.querySelector('.scene');
let targetX = 0, targetY = 0, currentX = 0, currentY = 0;

scene.addEventListener('mousemove', (e) => {
    const rect = scene.getBoundingClientRect();
    targetY = (e.clientX - (rect.left + rect.width / 2)) / (rect.width / 2) * 5; 
    targetX = -(e.clientY - (rect.top + rect.height / 2)) / (rect.height / 2) * 5; 
});

scene.addEventListener('mouseleave', () => { targetX = 0; targetY = 0; });

function animate() {
    currentX += (targetX - currentX) * 0.08;
    currentY += (targetY - currentY) * 0.08;
    clock.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
