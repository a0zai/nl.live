<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>A(See(n)see)Z</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<style>
:root {
    --sense-green: #b2f2bb;
    --sense-blue: #90e0ef;
    --sense-red: #cc7a7a;
}
html, body {
    height: 100%;
    margin: 0;
    background: #000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
}
#vanta-bg, #particles-stars {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}
#vanta-bg { opacity: 0.35; filter: saturate(140%) contrast(115%); }

/* Main content */
.main-content {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

/* Scene */
.scene { perspective: 1448px; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

/* Clock */
.clock-container {
    transform-style: preserve-3d;
    transition: transform 0.15s ease-out;
    will-change: transform;
    position: relative;
    width: 80vmin;
    height: 80vmin;
    max-width: 700px;
    max-height: 700px;
    border-radius: 50%;
    border: 2px solid rgba(200,170,90,0.38);
    box-shadow: 0 0 30px rgba(210,170,80,0.12),
                0 0 55px rgba(0,0,0,0.65),
                inset 0 0 18px rgba(0,0,0,0.6),
                inset 0 0 5px rgba(210,170,80,0.2);
}
.glass-cover {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    box-shadow: inset 0 20px 60px rgba(255,255,255,0.15),
                0 0 40px rgba(255,255,255,0.1);
    backdrop-filter: blur(4px);
    pointer-events: none;
    transform: translateZ(3%);
}

/* Numbers */
.number {
    position: absolute;
    width: 100%; height: 100%;
    text-align: center;
    font-size: 5vmin;
    font-weight: bold;
    padding: 20px;
    box-sizing: border-box;
    color: #f1f5f9;
}
.n1  { transform: rotate(0deg); }    .n1 div  { transform: rotate(0deg); }  
.n2  { transform: rotate(60deg); }   .n2 div  { transform: rotate(-60deg); }
.n3  { transform: rotate(120deg); }  .n3 div  { transform: rotate(-120deg); }
.n4  { transform: rotate(180deg); }  .n4 div  { transform: rotate(-180deg); }
.n5  { transform: rotate(240deg); }  .n5 div  { transform: rotate(-240deg); }
.nƐ3 { transform: rotate(300deg); }  .nƐ3 div { transform: rotate(-300deg); }  /* الرقم 6 */
.n7  { transform: rotate(0deg); }    .n7 div { transform: rotate(0deg); } 
.n8  { transform: rotate(60deg); }   .n8 div { transform: rotate(-60deg); } 
.n9  { transform: rotate(120deg); }  .n9 div { transform: rotate(-120deg); } 
.n10 { transform: rotate(180deg); }  .n10 div { transform: rotate(-180deg); } 
.n11 { transform: rotate(240deg); }  .n11 div { transform: rotate(-240deg); } 
.n12 { transform: rotate(300deg); }  .n12 div { transform: rotate(-300deg); } 
/* Hands */
.hand {
    position: absolute;
    bottom: 50%; left: 50%;
    transform-origin: bottom;
    border-radius: 10px;
    transform: translate(-50%, -50%);
}
.hour   { width:0.85%;  height:20%; background: rgba(241,245,249,0.25); box-shadow:0 0 10px rgba(241,245,249,0.3);}
.minute { width:0.6%;  height:26%; background: var(--sense-red); box-shadow:0 0 11px var(--sense-red);}
.second { width:0.4%;  height:27%; background: var(--sense-blue); box-shadow:0 0 12px var(--sense-blue);}

/* Center dot */
.center-dot {
    position: absolute; top:50%; left:50%;
    width:0.85%; height:1%;
    background: var(--sense-green);
    border-radius:50%;
    transform: translate(-50%,-50%);
    animation: pulse 1.448s ease-in-out infinite;
    box-shadow:0 0 27px rgba(178,242,187,0.9);
    z-index:10;
}
@keyframes pulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity:0.9; }
    50% { transform: translate(-50%,-50%) scale(1.7); opacity:0.4; }
}

/* Brand */
.brand-name {
    position:absolute; top:63%; left:50%;
    transform:translate(-50%,-50%);
    color: var(--sense-green);
    font-size:2vmin; letter-spacing:1vmin;
    opacity:0.6; text-transform:uppercase;
}

/* Tagline */
.tagline {
    margin-top:3vmin; color:#fff; opacity:0.85;
    font-size:1.5vmin; letter-spacing:0.3vmin; text-align:center; width:100%;
}
</style>
</head>
<body>
<div id="vanta-bg"></div>
<div id="particles-stars"></div>

<div class="main-content">
  <div class="scene">
    <div class="clock-container">
      <div class="glass-cover"></div>
      <div class="brand-name">Seensee</div>
      <div class="center-dot"></div>
      <div class="number n1"><div>1</div></div>
      <div class="number n2"><div>2</div></div>
      <div class="number n3"><div>3</div></div>
      <div class="number n4"><div>4</div></div>
      <div class="number n5"><div>5</div></div>
      <div class="number nƐ3"><div>6</div></div>
      <div class="number n7"><div>7</div></div>
      <div class="number n8"><div>8</div></div>
      <div class="number n9"><div>9</div></div>
      <div class="number n10"><div>10</div></div>
      <div class="number n11"><div>11</div></div>
      <div class="number n12"><div>12</div></div>
      <div class="hand hour" id="hour"></div>
      <div class="hand minute" id="minute"></div>
      <div class="hand second" id="second"></div>
    </div>
    <div class="tagline">The instinct of Sensation</div>
  </div>
</div>

<script>
function updateClock() {
    const now = new Date();
    const ms = now.getMilliseconds();
    const s = now.getSeconds() + ms / 1000;
    const m = now.getMinutes() + s / 60;
    const h = (now.getHours() % 12) + m / 60;
    second.style.transform = `translateX(-50%) rotate(${s*30}deg)`; // كل رقم يمثل 30°
    minute.style.transform = `translateX(-50%) rotate(${m*6}deg)`; // 360/60 = 6° لكل دقيقة
    hour.style.transform   = `translateX(-50%) rotate(${h*30}deg)`; // 360/12 = 30° لكل ساعة

    requestAnimationFrame(updateClock);
}
updateClock();
</script>
<script>
/* Vanta fog */
VANTA.FOG({
    el: "#vanta-bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200.0,
    minWidth: 200.0,
    highlightColor: 0x90e0ef,
    midtoneColor: 0xb2f2bb,
    lowlightColor: 0x0b132b,
    baseColor: 0x000000,
    blurFactor: 0.14,
    speed: 0.4,
    zoom: 1.1
});

/* Stars particles */
particlesJS("particles-stars", {
    particles: {
        number: { value: 72, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        opacity: { value: 0.6, random: true, anim: { enable: true, speed: 2.5, opacity_min: 0.2, sync: false } },
        size: { value: 1.5, random: true, anim: { enable: true, speed: 2, size_min: 0.5, sync: false } },
        move: { enable: true, speed: 0.2, direction: "none", random: true },
        line_linked: { enable: false }
    },
    retina_detect: true
});
</script>
</body>
</html>
