<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NL.LIVE | Live Chat & Camera</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; padding: 15px; }
        .box { border: 1px solid #00ff41; padding: 15px; max-width: 400px; margin: 0 auto; background: #050505; border-radius: 8px; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #00ff41; color: #00ff41; box-sizing: border-box; font-family: monospace; }
        button { background: #00ff41; color: #000; font-weight: bold; cursor: pointer; }
        #chat-box { height: 350px; overflow-y: auto; border: 1px solid #00ff41; padding: 10px; margin-bottom: 10px; background: rgba(0,20,0,0.3); }
        
        /* نظام عرض الكاميرا */
        #video-container { display: none; border: 2px solid red; position: relative; margin-bottom: 10px; text-align: center; }
        video, canvas { width: 100%; background: #222; }
        .live-label { position: absolute; top: 5px; left: 5px; background: red; color: white; padding: 2px 5px; font-size: 10px; z-index: 5; }
        
        .msg { margin-bottom: 10px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .sos-msg { color: #ff0000; border: 2px solid #ff0000; padding: 10px; font-weight: bold; }
        .remote-stream { border: 1px solid red; margin-top: 5px; width: 100%; }
    </style>
</head>
<body>

<div id="login-ui" class="box">
    <h2 style="text-align:center">NL.LIVE</h2>
    <input id="nick-input" placeholder="GEBRUIKERSNAAM" maxlength="12">
    <select id="city-select" onchange="window.updateStreets(this.value)">
        <option value="">-- KIES STAD --</option>
        <option value="Doetinchem">DOETINCHEM</option>
    </select>
    <select id="street-select" style="display:none;"></select>
    <button onclick="window.boot()">SYSTEEM STARTEN</button>
</div>

<div id="chat-ui" class="box" style="display:none;">
    <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:10px;">
        <span id="zone-display">ZONE</span>
        <span id="user-count">0 LIVE</span>
    </div>

    <div id="video-container">
        <div class="live-label">MY LIVE</div>
        <video id="v-preview" autoplay playsinline muted></video>
        <canvas id="v-canvas" style="display:none;"></canvas>
        <button onclick="window.stopLive()" style="background:red; color:white; border:none; margin:0;">STOP LIVE</button>
    </div>

    <button onclick="window.startLive()" style="background:#0044ff; color:white;">📷 GA LIVE IN DE BUURT</button>
    <button onclick="window.sendSOS()" style="background:red; color:white;">🆘 SOS MELDING</button>

    <div id="chat-box"></div>
    
    <div style="display:flex; gap:5px;">
        <input id="msg-input" placeholder="Typ een bericht..." maxlength="33">
        <button onclick="window.sendMsg()" style="width:70px;">SND</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, serverTimestamp, onValue, onDisconnect, set, remove } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

const firebaseConfig = { 
    apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
    projectId: "a0zai-56c3a", 
    databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const streetData = {
    "Doetinchem": {
        "MARKT": { lat: 51.9653, lon: 6.2893 },
        "STEENSTRAAT": { lat: 51.9658, lon: 6.2912 },
        "2E LOOLAAN": { lat: 51.9700, lon: 6.3000 }
        // أضف البقية هنا..
    }
};

let myNick, myPath, liveInterval;

window.updateStreets = (city) => {
    const sSelect = document.getElementById("street-select");
    sSelect.innerHTML = '<option value="">-- KIES STRAAT --</option>';
    if(streetData[city]) {
        Object.keys(streetData[city]).sort().forEach(s => {
            let opt = document.createElement("option"); opt.value = s; opt.textContent = s;
            sSelect.appendChild(opt);
        });
        sSelect.style.display = "block";
    }
};

window.boot = () => {
    myNick = document.getElementById("nick-input").value.trim().toUpperCase();
    const city = document.getElementById("city-select").value;
    const street = document.getElementById("street-select").value;

    if(!myNick || !city || !street) return alert("VUL ALLES IN!");

    navigator.geolocation.getCurrentPosition((p) => {
        const dist = calculateDistance(p.coords.latitude, p.coords.longitude, streetData[city][street].lat, streetData[city][street].lon);
        if(dist > 309) return alert(`TE VER! Je bent ${Math.round(dist)}m van de straat.`);

        myPath = `v6/${city}/${street}`;
        document.getElementById("login-ui").style.display = "none";
        document.getElementById("chat-ui").style.display = "block";
        document.getElementById("zone-display").textContent = street;
        startApp();
    }, () => alert("GPS NODIG!"), {enableHighAccuracy: true});
};

function startApp() {
    const msgRef = ref(db, `${myPath}/msgs`);
    const onlineRef = ref(db, `${myPath}/online/${myNick}`);
    const liveStreamRef = ref(db, `${myPath}/live_video/${myNick}`);

    set(onlineRef, true);
    onDisconnect(onlineRef).remove();
    onDisconnect(liveStreamRef).remove();

    onValue(ref(db, `${myPath}/online`), s => {
        document.getElementById("user-count").textContent = (s.exists() ? Object.keys(s.val()).length : 0) + " LIVE";
    });

    onChildAdded(msgRef, s => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = d.type === 'SOS' ? "msg sos-msg" : "msg";
        div.innerHTML = `<b>${d.n}:</b> ${d.m}`;
        document.getElementById("chat-box").appendChild(div);
        document.getElementById("chat-box").scrollTop = 99999;
    });

    // مراقبة البث المباشر للآخرين
    onValue(ref(db, `${myPath}/live_video`), s => {
        if(s.exists()){
            const streams = s.val();
            Object.keys(streams).forEach(user => {
                if(user !== myNick) {
                    let remoteImg = document.getElementById("live-" + user);
                    if(!remoteImg) {
                        remoteImg = document.createElement("img");
                        remoteImg.id = "live-" + user;
                        remoteImg.className = "remote-stream";
                        document.getElementById("chat-box").prepend(remoteImg);
                    }
                    remoteImg.src = streams[user].frame;
                }
            });
        }
    });

    window.sendMsg = () => {
        const inp = document.getElementById("msg-input");
        if(inp.value) { push(msgRef, { n: myNick, m: inp.value, t: serverTimestamp() }); inp.value = ""; }
    };

    window.sendSOS = () => {
        if(confirm("SOS STUREN?")) push(msgRef, { n: "🚨 " + myNick, m: "HULP NODIG!", type: 'SOS' });
    };

    // وظيفة الكاميرا الحقيقية
    window.startLive = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            const video = document.getElementById("v-preview");
            video.srcObject = stream;
            document.getElementById("video-container").style.display = "block";
            
            const canvas = document.getElementById("v-canvas");
            const ctx = canvas.getContext('2d');

            liveInterval = setInterval(() => {
                canvas.width = 200; // حجم صغير للسرعة
                canvas.height = 150;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const frameData = canvas.toDataURL('image/jpeg', 0.5); // ضغط الصورة 50%
                set(liveStreamRef, { frame: frameData, t: Date.now() });
            }, 500); // إرسال فريم كل نصف ثانية

        } catch (e) { alert("Camera error!"); }
    };

    window.stopLive = () => {
        clearInterval(liveInterval);
        const v = document.getElementById("v-preview");
        if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById("video-container").style.display = "none";
        remove(liveStreamRef);
    };
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
</script>
</body>
</html>
