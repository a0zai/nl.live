<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>live</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --neon: #00ffa3;
            --neon-glow: rgba(0, 255, 163, 0.4);
            --danger: #ff3e3e;
            --bg-deep: #05070a;
            --panel: rgba(13, 17, 23, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-deep); color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

#map { 
    position: absolute; 
    top: 0; 
    bottom: 0; 
    width: 100%; 
    z-index: 1; 
    filter: hue-rotate(10deg) brightness(1.1) contrast(1.2);
}
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            border: 10px solid rgba(0, 255, 163, 0.05);
            box-sizing: border-box;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        /* Floating Panel */
        .floating-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 420px;
            z-index: 100; display: flex; flex-direction: column; gap: 10px;
        }

        .glass-box {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .status-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px 10px 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 10px;
        }

        .indicator {
            display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: bold;
            color: var(--neon); text-transform: uppercase; letter-spacing: 1px;
        }

        .dot-blink {
            width: 8px; height: 8px; background: var(--neon); border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #chat-container {
            height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
            scrollbar-width: none; mask-image: linear-gradient(to bottom, transparent, black 15%);
        }

        .message {
            background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 15px;
            border-left: 3px solid var(--neon); font-size: 13px; line-height: 1.4;
        }

        .message b { color: var(--neon); font-size: 11px; display: block; margin-bottom: 2px; }

        .input-group {
            display: flex; gap: 8px; margin-top: 5px;
        }

        input {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 12px; color: white; outline: none;
        }

        .btn-send {
            background: var(--neon); border: none; width: 50px; border-radius: 15px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* Auth Screen */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg-deep);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%; max-width: 350px; text-align: center;
        }

        .auth-card h1 { 
            font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 30px;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        .sos-btn { 
            background: rgba(255, 62, 62, 0.1); border: 1px solid var(--danger); 
            color: var(--danger); padding: 10px; border-radius: 12px; font-weight: bold;
        }

        /* Map Marker Styles */
        .custom-user-icon {
            background: var(--neon); border: 3px solid white; border-radius: 50%;
            box-shadow: 0 0 15px var(--neon);
        }

.tactical-label {
    background: rgba(0, 20, 0, 0.7) !important;
    border: 1px solid #00ffa3 !important;
    color: #00ffa3 !important;
    font-family: 'Courier New', monospace;
    font-size: 11px !important;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 4px;
    box-shadow: 0 0 10px rgba(0, 255, 163, 0.3);
}

    </style>
</head>

            </div>

    onAuthStateChanged(auth, (user) => {
        if (user) {
            myUID = user.uid;
            myNick = user.displayName || "UNIT-X";
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            initRadar();
        }
    });

    function initRadar() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([51.965, 6.290], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        navigator.geolocation.watchPosition(p => {
            const { latitude, longitude } = p.coords;
            currentPos = [latitude, longitude];
            document.getElementById('coords-display').innerText = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;

            if (!myMarker) {
                myMarker = L.circleMarker(currentPos, { radius: 8, color: '#fff', fillColor: '#00ffa3', fillOpacity: 1, weight: 3 }).addTo(map);
                map.flyTo(currentPos, 16);
            } else {
                myMarker.setLatLng(currentPos);
            }

            checkSector(latitude, longitude);
            set(ref(db, `radar/units/${myUID}`), { n: myNick, lat: latitude, lon: longitude, t: Date.now() });
            onDisconnect(ref(db, `radar/units/${myUID}`)).remove();
        }, null, { enableHighAccuracy: true });

onValue(ref(db, `radar/units`), snap => {
    const units = snap.val() || {};
    Object.keys(otherMarkers).forEach(id => { 
        if(!units[id]) { map.removeLayer(otherMarkers[id]); delete otherMarkers[id]; } 
    });

    for(let id in units) {
        if(id === myUID) continue;
        const {lat, lon, n} = units[id];
        
        const dist = L.latLng(currentPos).distanceTo([lat, lon]); 
        const distLabel = dist > 1000 ? (dist/1000).toFixed(1) + " km" : Math.round(dist) + " m";
        
        if(otherMarkers[id]) {
            otherMarkers[id].setLatLng([lat, lon]);
            otherMarkers[id].getTooltip().setContent(`${n} [${distLabel}]`);
        } else {
            otherMarkers[id] = L.circleMarker([lat, lon], { radius: 6, color: '#00ffa3', weight: 1, fillOpacity: 0.5 })
                .addTo(map).bindTooltip(`${n} [${distLabel}]`, { permanent: true, className: 'tactical-label', direction: 'top' });
        }
    }
});

        onChildAdded(ref(db, `radar/comms`), s => {
            const data = s.val();
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            const isSOS = data.m.includes("EMERGENCY") || data.n.includes("🚨");
            div.className = 'message';
            if(isSOS) div.style.borderLeft = "3px solid var(--danger)";
            div.innerHTML = `<b style="${isSOS ? 'color:var(--danger)' : ''}">${data.n}</b> ${data.m}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });
    }

    function checkSector(lat, lon) {
        let found = sectors.find(s => L.latLng(lat, lon).distanceTo([s.lat, s.lon]) <= 300);
        const display = document.getElementById('street-name');
        if (found) {
            if (!inZone && navigator.vibrate) navigator.vibrate(100);
            inZone = true;
            display.innerText = `SECTOR: ${found.name}`;
            display.style.color = 'var(--neon)';
        } else {
            inZone = false;
            display.innerText = `OUTSIDE SECURE ZONE`;
            display.style.color = 'var(--danger)';
        }
    }

    window.sendMsg = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        push(ref(db, `radar/comms`), { n: myNick, m: input.value, t: Date.now() });
        input.value = '';
    };

    window.sos = () => {
        push(ref(db, `radar/comms`), { n: "🚨 " + myNick, m: "EMERGENCY: UNIT REQUIRES ASSISTANCE!", t: Date.now() });
        if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
    };

    window.access = async (mode) => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const n = document.getElementById('nick').value;
        try {
            if(mode === 'reg') {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await updateProfile(res.user, { displayName: n });
                location.reload();
            } else { await signInWithEmailAndPassword(auth, e, p); }
        } catch(err) { alert(err.message); }
    };

    window.reCenter = () => map.flyTo(currentPos, 16);
    document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') window.sendMsg(); });
window.addEventListener('offline', () => {
    const status = document.getElementById('street-name');
    status.innerText = "⚠️ SIGNAL LOST - GPS ONLY";
    status.style.color = "#ff9800";
    if(navigator.vibrate) navigator.vibrate(500); 
});

window.addEventListener('online', () => {
    const status = document.getElementById('street-name');
    status.innerText = "SIGNAL RESTORED";
    status.style.color = "var(--neon)";
    setTimeout(() => checkSector(currentPos[0], currentPos[1]), 2000);
});
