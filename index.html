<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FULL LIVE</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:10px; }
.box { border:1px solid #0f0; padding:10px; max-width:500px; margin:auto; }
button, input { width:100%; padding:10px; margin:5px 0; background:#000; color:#0f0; border:1px solid #0f0; }
video { width:100%; margin-top:10px; }
</style>
</head>

<body>

<div id="login" class="box">
<input id="nick" placeholder="USERNAME">
<button onclick="start()">ENTER</button>
</div>

<div id="app" class="box" style="display:none;">

<button onclick="requestLive()">📡 Request Live</button>

<div id="adminPanel"></div>

<h3>Live</h3>
<video id="video" autoplay playsinline></video>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, onChildAdded } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
  projectId: "a0zai-56c3a",
  databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let myUID, myNick;

const ADMIN_UID = "PYbVPqlRZ3YwAhI0CHDAct5l3m83";

const path = "live_system";
signInAnonymously(auth).then(u => {
  myUID = u.user.uid;
});

/* ---------- LOGIN ---------- */
window.start = () => {
  myNick = document.getElementById("nick").value;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  if(myUID === ADMIN_UID){
    listenRequests();
  }

  joinLive(); // أي مستخدم يشوف اللايف
};

/* ---------- REQUEST LIVE ---------- */
window.requestLive = () => {
  push(ref(db, path + "/requests"), {
    uid: myUID,
    nick: myNick,
    status: "pending"
  });

  alert("Waiting approval...");
};

/* ---------- ADMIN ---------- */
function listenRequests(){
  onChildAdded(ref(db, path + "/requests"), (snap) => {
    const r = snap.val();
    const key = snap.key;

    if(r.status !== "pending") return;

    const div = document.createElement("div");
    div.innerHTML = `
      <b>${r.nick}</b><br>
      <button onclick="approve('${key}')">Approve</button>
      <button onclick="reject('${key}')">Reject</button>
    `;

    document.getElementById("adminPanel").appendChild(div);
  });
}

window.approve = (key) => {
  set(ref(db, path + "/requests/" + key + "/status"), "approved");
  startBroadcast();
};

window.reject = (key) => {
  set(ref(db, path + "/requests/" + key + "/status"), "rejected");
};

/* ---------- BROADCAST ---------- */
let pc;

async function startBroadcast(){

  const stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });

  document.getElementById("video").srcObject = stream;

  pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  stream.getTracks().forEach(track => pc.addTrack(track, stream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  set(ref(db, path + "/webrtc/offer"), offer);

  onValue(ref(db, path + "/webrtc/answer"), async (snap) => {
    const answer = snap.val();
    if(answer){
      await pc.setRemoteDescription(answer);
    }
  });
}

/* ---------- VIEWER ---------- */
async function joinLive(){

  pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.ontrack = (e) => {
    document.getElementById("video").srcObject = e.streams[0];
  };

  const offerSnap = await new Promise(resolve => {
    onValue(ref(db, path + "/webrtc/offer"), resolve, { onlyOnce:true });
  });

  const offer = offerSnap.val();
  if(!offer) return;

  await pc.setRemoteDescription(offer);

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  set(ref(db, path + "/webrtc/answer"), answer);
}

</script>

</body>
</html>
