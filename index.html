function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c * 1000; 
}

        sSelect.value = "";
    }
};
// 4. وظيفة الدخول والتحقق من الرادار
window.boot = () => {
    // طلب إذن الإشعارات فور الضغط
    if ('Notification' in window) { Notification.requestPermission(); }

    const nickInput = document.getElementById("nick-input");
    const nick = nickInput.value.trim().toUpperCase();
    const cityVal = document.getElementById("city-select").value;
    const cityName = cityVal.replace(/_/g, ' ');
    const street = document.getElementById("street-select").value;

    if(!/^[A-Z0-9]+$/.test(nick)) return alert("INVALID ID (A-Z, 0-9)");
    if(!cityVal) return alert("SELECT CITY");
    if (streetData[cityName] && !street) return alert("SELECT STREET");

    localStorage.setItem("a0z_nick_v6", nick);
    
    navigator.geolocation.getCurrentPosition((p) => {
        const uLat = p.coords.latitude;
        const uLon = p.coords.longitude;

        if (street && streetData[cityName] && streetData[cityName][street]) {
            const target = streetData[cityName][street];
            const dist = getDistance(uLat, uLon, target.lat, target.lon);
            // تقليل المسافة لـ 309 متر كما طلبت
            if (dist > 309) {
                return alert(`ACCESS DENIED: Je bent ${Math.round(dist)}m verwijderd.`);
            }
        }
        startRadar(cityVal, nick, street);
    }, (err) => {
        alert("GPS REQUIRED.");
    }, { enableHighAccuracy: true });
};

// 5. وظيفة الرادار والدردشة
function startRadar(zID, myNick, sID = null) {
    document.getElementById("login-ui").style.display = "none";
    document.getElementById("chat-ui").style.display = "flex";
    
    const displayZone = sID ? sID : zID.replace(/_/g, ' ');
    const dbPath = sID ? `v6/${zID}/streets/${sID}` : `v6/${zID}`;
    document.getElementById("zone-display").textContent = `Z: ${displayZone}`;

    const msgRef = ref(db, `${dbPath}/msgs`);
    const onlineList = ref(db, `${dbPath}/online`);
    const onlineRef = ref(db, `${dbPath}/online/${myNick}`);

    set(onlineRef, serverTimestamp());
    onDisconnect(onlineRef).remove();
    
    onValue(onlineList, (s) => {
        const count = s.val() ? Object.keys(s.val()).length : 0;
        document.getElementById("online-count").textContent = `👥 ${count} ONLINE`;
    });

    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const usageRef = ref(db, `v6_usage/${myNick}/${today}`);
    
    onValue(usageRef, (s) => {
        document.getElementById("char-limit").textContent = `${33 - (s.val() || 0)} LEFT`;
    });

    window.send = () => {
        const inp = document.getElementById("msg-input");
        const txt = inp.value.trim();
        if(!txt) return;
        get(usageRef).then((s) => {
            let used = s.val() || 0;
            if(used + txt.length > 99) return alert("LIMIT REACHED");
            push(msgRef, { n: myNick, m: txt, t: serverTimestamp() });
            set(usageRef, used + txt.length);
            inp.value = "";
        });
    };

    // دالة إرسال SOS
    window.sendSOS = () => {
        if(!confirm("⚠️ SEND SOS TO NEIGHBORS?")) return;
        navigator.geolocation.getCurrentPosition((p) => {
            const mapUrl = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
            push(msgRef, { n: `🚨 SOS: ${myNick}`, m: `HULP NODIG! Locatie: ${mapUrl}`, t: serverTimestamp(), isSOS: true });
        });
    };
document.getElementById("back-btn").onclick = () => {
    set(onlineRef, null); 
    document.getElementById("chat-ui").style.display = "none";
    document.getElementById("login-ui").style.display = "flex";
};

    onChildAdded(msgRef, (s) => {
        const d = s.val();
        const chatBox = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = "msg-line";

        if (d.isSOS) {
            const sosAlarm = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            sosAlarm.play().catch(() => {});
            div.style.background = "rgba(255, 0, 0, 0.2)";
            div.style.borderLeft = "4px solid #ff3333";
        } else {
            new Audio('https://fsa.zapsplat.com/p_audio/zapsplat_multimedia_beep_short_high_pitched_004_102073.mp3').play().catch(() => {});
        }

        const displayTime = d.t ? new Date(d.t).toLocaleTimeString() : new Date().toLocaleTimeString();
        div.innerHTML = `<span class="timestamp">[${displayTime}]</span><br><b style="${d.isSOS ? 'color:#ff3333;' : ''}">${d.n}✅</b>: ${d.m}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// 6. الماتريكس و PWA (نهاية الكود)
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const chars = "01"; const fontSize = 16;
const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ff41";
    drops.forEach((y, i) => {
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.98) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(drawMatrix, 60);

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(() => console.log('PWA OK ✅'));
}
