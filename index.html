<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NL | Live</title>
    <style>
        :root { --neon: #00ff41; --bg: #000; --red: #ff0000; --dark-grey: #111; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        
        .container { max-width: 500px; margin: auto; padding: 10px; box-sizing: border-box; }
        .box { border: 1px solid var(--neon); padding: 15px; border-radius: 8px; background: #050505; margin-bottom: 10px; }
        
        /* تحسين الهيدر لعدم تداخل النصوص */
        .radar-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 12px; 
            border-bottom: 1px solid var(--neon); 
            padding-bottom: 8px; 
            margin-bottom: 15px;
            gap: 10px;
        }
        #zone-txt { color: var(--neon); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dist-badge { color: yellow; min-width: fit-content; }

        /* نظام الأزرار الجديد */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        button { 
            width: 100%; 
            padding: 15px 5px; 
            background: #000; 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 13px;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        button:active { background: var(--neon); color: #000; }
        
        button.sos { border-color: var(--red); color: var(--red); }
        button.sos:active { background: var(--red); color: white; }

        #view-count { background: var(--dark-grey); border-color: yellow; color: yellow; }

        /* Chat */
        #chat-box { 
            height: 250px; 
            overflow-y: auto; 
            border: 1px solid var(--dark-grey); 
            padding: 10px; 
            margin-bottom: 10px; 
            font-size: 13px; 
            background: rgba(0,255,65,0.02);
        }
        .msg { margin-bottom: 8px; border-left: 2px solid var(--neon); padding-left: 8px; line-height: 1.4; }
        .msg b { color: #fff; font-size: 11px; display: block; margin-bottom: 2px; }
        
        /* Live & Video */
        #live-container { display: none; position: relative; border: 2px solid var(--red); margin-bottom: 10px; overflow: hidden; }
        video { width: 100%; aspect-ratio: 4/3; background: #222; display: block; object-fit: cover; }
        .live-tag { position: absolute; top: 8px; left: 8px; background: var(--red); color: white; padding: 3px 8px; font-size: 10px; font-weight: bold; border-radius: 3px; z-index: 10; }

        /* Input Bar */
        .input-bar { display: flex; gap: 5px; background: #000; padding: 5px 0; }
        input { flex: 1; padding: 12px; background: #000; border: 1px solid var(--neon); color: var(--neon); font-size: 14px; }
        .send-btn { width: 70px; background: var(--neon); color: #000; }

        /* Viewers list hidden */
        #viewers-list { border: 1px solid yellow; padding: 10px; font-size: 12px; margin-bottom: 10px; background: #111; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-ui" class="box">
        <h2 style="text-align:center">NL LIVE</h2>
        <input id="nick-input" placeholder="NICKNAME" maxlength="12">
        <select id="city-select" onchange="window.updateStreets(this.value)">
            <option value="">-- KIES STAD --</option>
            <option value="Doetinchem">DOETINCHEM</option>
        </select>
        <select id="street-select" style="display:none;"></select>
        <button onclick="window.boot()" style="background:var(--neon); color:#000; margin-top:10px;">Join Chat</button>
    </div>

    <div id="app-ui" style="display:none;">
        <button onclick="window.goBack()" style="padding:8px; font-size:11px; margin-bottom:10px; width:auto; border-color:#444;">⬅ TERUG</button>
        
        <div class="radar-header">
            <div id="zone-txt">ZONE: -</div>
            <div class="dist-badge" id="dist-txt">RADAR: OK</div>
        </div>

        <div class="action-grid">
            <button id="view-count" onclick="window.showViewers()">👥 0 VIEWERS</button>
            <button id="cam-btn" onclick="window.startLive()">📷 GA LIVE</button>
            <button class="sos" onclick="window.sendSOS()">🆘 NOOD (SOS)</button>
            <button onclick="document.getElementById('msg-input').focus()" style="border-color:cyan; color:cyan;">💬 CHAT</button>
        </div>

        <div id="viewers-list" style="display:none;">
            <strong style="color:yellow;">NU ONLINE:</strong>
            <div id="names-area" style="color:#ccc; margin-top:5px;"></div>
        </div>

        <div id="live-container">
            <div class="live-tag">YOU ARE LIVE</div>
            <video id="v-preview" autoplay playsinline muted></video>
            <canvas id="v-canvas" style="display:none;"></canvas>
            <button onclick="window.stopLive()" style="background:var(--red); color:white; border:none; padding:10px;">STOP BROADCAST</button>
        </div>

        <div id="remote-streams"></div>

        <div id="chat-box"></div>

        <div class="input-bar">
            <input id="msg-input" placeholder="Bericht..." maxlength="33" onkeydown="if(event.key==='Enter') window.sendMsg()">
            <button class="send-btn" onclick="window.sendMsg()">SND</button>
        </div>
    </div>
</div>

let myNick, myPath, liveInt;

// 1. تحديث الشوارع عند اختيار المدينة
window.updateStreets = (city) => {
    const s = document.getElementById("street-select");
    s.innerHTML = '<option value="">-- KIES STRAAT --</option>';
    if(streetData[city]) {
        Object.keys(streetData[city]).forEach(st => {
            let o = document.createElement("option"); o.value = st; o.textContent = st;
            s.appendChild(o);
        });
        s.style.display = "block";
    }
};


window.boot = () => {
    myNick = document.getElementById("nick-input").value.trim().toUpperCase();
    const city = document.getElementById("city-select").value;
    const street = document.getElementById("street-select").value;
    if(!myNick || !city || !street) return alert("VUL ALLES IN!");
    localStorage.setItem("savedNick", myNick);
    navigator.geolocation.getCurrentPosition((p) => {
        const dist = calcDist(p.coords.latitude, p.coords.longitude, streetData[city][street].lat, streetData[city][street].lon);
        
        if(dist > 309) {
            alert(`GEEN TOEGANG: Je bent ${Math.round(dist)}m verwijderd. (Max 309m)`);
            return;
        }

        myPath = `v6/${city}/${street}`;
        document.getElementById("login-ui").style.display = "none";
        document.getElementById("app-ui").style.display = "block";
        document.getElementById("zone-txt").textContent = street;
        document.getElementById("dist-txt").textContent = `RADAR: ${Math.round(dist)}m`;
        startSystem();
    }, () => alert("GPS AAN ZETTEN!"), {enableHighAccuracy: true});
};

// 3. النظام الأساسي (الدردشة واللايف)
function startSystem() {
    const msgRef = ref(db, `${myPath}/msgs`);
    const onlineRef = ref(db, `${myPath}/online/${myNick}`);
    const liveRef = ref(db, `${myPath}/lives/${myNick}`);

    // إعداد حالة الاتصال
    set(onlineRef, true);
    onDisconnect(onlineRef).remove();
    onDisconnect(liveRef).remove();

    // نظام الحذف التلقائي للرسائل القديمة (أكبر من 14 ساعة)
    const fourteenHoursAgo = Date.now() - (14 * 60 * 60 * 1000);
    onValue(msgRef, (snap) => {
        if (snap.exists()) {
            snap.forEach((child) => {
                if (child.val().t < fourteenHoursAgo) {
                    remove(ref(db, `${myPath}/msgs/${child.key}`));
                }
            });
        }
    }, { onlyOnce: true });

    // تحديث قائمة الأونلاين
    onValue(ref(db, `${myPath}/online`), (s) => {
        const namesArea = document.getElementById("names-area");
        const users = s.exists() ? Object.keys(s.val()) : [];
        document.getElementById("view-count").textContent = users.length + " VIEWERS";
        if (namesArea) namesArea.textContent = users.join(", ");
    });

    // إرسال الرسائل
    window.sendMsg = () => {
        const i = document.getElementById("msg-input");
        if (i.value.trim()) { 
            push(msgRef, { n: myNick, m: i.value, t: Date.now() }); 
            i.value = ""; 
        }
    };

    // إرسال SOS
    window.sendSOS = () => {
        push(msgRef, { n: "🚨 SOS", m: `${myNick} HEEFT HULP NODIG!`, t: Date.now() });
    };

    // استقبال الرسائل وعرضها
    onChildAdded(msgRef, s => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<b>${d.n}:</b> ${d.m}`;
        const box = document.getElementById("chat-box");
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });

    // البث المباشر (إرسال)
    window.startLive = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById("v-preview").srcObject = stream;
            document.getElementById("live-container").style.display = "block";
            const canvas = document.getElementById("v-canvas");
            const ctx = canvas.getContext('2d');

            liveInt = setInterval(() => {
                canvas.width = 320; canvas.height = 240;
                ctx.drawImage(document.getElementById("v-preview"), 0, 0, canvas.width, canvas.height);
                const data = canvas.toDataURL('image/jpeg', 0.4); // ضغط الصورة لتقليل استهلاك البيانات
                set(liveRef, { frame: data, t: Date.now() });
            }, 700); 
        } catch (e) { alert("Camera Error: " + e.message); }
    };

    // إيقاف البث
    window.stopLive = () => {
        clearInterval(liveInt);
        const v = document.getElementById("v-preview");
        if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById("live-container").style.display = "none";
        remove(liveRef);
    };

    // استقبال بث الجيران (استقبال)
    onValue(ref(db, `${myPath}/lives`), s => {
        const container = document.getElementById("remote-streams");
        const allLives = s.val() || {};
        
        // حذف فيديوهات الأشخاص الذين غادروا
        Array.from(container.children).forEach(child => {
            const userId = child.id.replace('peer-container-', '');
            if (!allLives[userId] || userId === myNick) {
                child.remove();
            }
        });

        // تحديث أو إضافة بث جديد
        Object.keys(allLives).forEach(user => {
            if(user === myNick) return;
            let img = document.getElementById("peer-img-" + user);
            if(!img) {
                const wrapper = document.createElement("div");
                wrapper.id = "peer-container-" + user;
                wrapper.className = "viewer-box";
                wrapper.innerHTML = `<div class="live-tag">LIVE: ${user}</div>`;
                img = document.createElement("img");
                img.id = "peer-img-" + user;
                img.style.width = "100%";
                wrapper.appendChild(img);
                container.appendChild(wrapper);
            }
            img.src = allLives[user].frame;
        });
    });
}

// وظائف مساعدة
window.showViewers = () => {
    const area = document.getElementById("viewers-list");
    area.style.display = area.style.display === "none" ? "block" : "none";
};

window.goBack = () => {
    if(confirm("Wil je de kamer verlaten?")) {
        location.reload();
    }
};

function calcDist(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

    const savedName = localStorage.getItem("savedNick");
    if (savedName) {
        document.getElementById("nick-input").value = savedName;
    }
};
