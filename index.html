<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NL TACTICAL V8 .. . RADAR ZONES</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --neon: #00ffa3;
            --danger: #ff3e3e;
            --bg-deep: #05070a;
            --panel: rgba(10, 15, 20, 0.95);
            --border: rgba(0, 255, 163, 0.2);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-deep); color: white;
            font-family: 'monospace', sans-serif;
            overflow: hidden;
        }

        #map { 
            position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; 
            filter: brightness(0.6) contrast(1.2) saturate(0.8);
        }

        /* Tactical UI */
        .floating-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 92%; max-width: 400px;
            z-index: 100; display: none; flex-direction: column; gap: 12px;
        }

        .glass-box {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .status-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 10px;
        }

        .sector-info { color: var(--neon); font-weight: bold; font-size: 13px; letter-spacing: 1px; }
        .coords { font-size: 10px; color: #555; }

        #chat-container {
            height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
            scrollbar-width: none; margin-bottom: 10px;
        }

        .message {
            background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px;
            border-left: 3px solid var(--neon); font-size: 11px;
        }
        .message.mayday { border-left-color: var(--danger); background: rgba(255, 62, 62, 0.05); }

        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input {
            flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 10px; color: white; font-size: 13px;
        }

        .btn-send { background: var(--neon); border: none; width: 45px; border-radius: 10px; cursor: pointer; }
        .btn-sos {
            background: rgba(255, 62, 62, 0.1); border: 1px solid var(--danger);
            color: var(--danger); padding: 10px; border-radius: 10px;
            font-weight: bold; font-size: 10px; width: 100%; cursor: pointer;
        }

        .tactical-label {
            background: rgba(0,0,0,0.9) !important; border: 1px solid var(--neon) !important;
            color: var(--neon) !important; font-size: 9px !important; text-transform: uppercase;
        }

        #auth-screen {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 12px; }
    </style>
</head>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color:var(--neon); text-align:center; letter-spacing:3px;">SYSTEM LOGIN</h2>
            <input id="email" type="email" placeholder="Email">
            <input id="pass" type="password" placeholder="Password">
            <input id="nick" type="text" placeholder="Callsign">
            <button onclick="window.access('login')" style="background:var(--neon); padding:12px; border-radius:10px; border:none; font-weight:bold;">CONNECT</button>
            <button onclick="window.access('reg')" style="background:transparent; color:#555; border:none; font-size:10px;">REGISTER NEW UNIT</button>
        </div>
    </div>

    <div id="map"></div>

    { name: "WEG NAAR GAANDEREN", lat: 51.9592, lon: 6.3185 }, { name: "WEIDEPAD", lat: 51.9532, lon: 6.2695 },
    { name: "WETERINGSTRAAT", lat: 51.9512, lon: 6.2648 }, { name: "WILHELMINALAAN", lat: 51.9672, lon: 6.2920 },
    { name: "WILGENSTRAAT", lat: 51.9732, lon: 6.3005 }, { name: "ZANDPAD", lat: 51.9655, lon: 6.2918 },
    { name: "ZANDSTRAAT", lat: 51.9658, lon: 6.2915 }, { name: "ZONNESTRAAT", lat: 51.9688, lon: 6.3035 },
    { name: "ZUIDERHAVEN", lat: 51.9632, lon: 6.2955 }, { name: "ZUIDERKANAALDIJK", lat: 51.9602, lon: 6.2965 },
    { name: "ZUIDERLAAN", lat: 51.9595, lon: 6.2752 }, { name: "ZUIDERSTRAAT", lat: 51.9655, lon: 6.2925 }
];

    onAuthStateChanged(auth, user => {
        if (user) {
            myUID = user.uid;
            myNick = user.displayName || "UNIT";
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            initRadar();
        }
    });

    function initRadar() {
        if (map) return;
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([51.965, 6.290], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // إنشاء مناطق الرادار (دوائر 300 متر)
        sectors.forEach(s => {
            const circle = L.circle([s.lat, s.lon], {
                radius: 300,
                color: 'var(--neon)',
                fillColor: 'var(--neon)',
                fillOpacity: 0.1,
                weight: 1
            }).addTo(map);
            
            circle.bindTooltip(s.name, { sticky: true, className: 'tactical-label' });
            zoneVisuals.push({ name: s.name, circle: circle, lat: s.lat, lon: s.lon });
        });

        navigator.geolocation.watchPosition(p => {
            const { latitude, longitude } = p.coords;
            const pos = [latitude, longitude];
            document.getElementById('coords-display').innerText = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;

            if (!myMarker) {
                myMarker = L.circleMarker(pos, { radius: 8, color: '#fff', fillColor: 'var(--neon)', fillOpacity: 1 }).addTo(map);
                map.panTo(pos);
            } else { myMarker.setLatLng(pos); }

            checkZones(latitude, longitude);

            set(ref(db, `${BASE_PATH}/lives/${myUID}`), { n: myNick, lat: latitude, lon: longitude, t: Date.now() });
        });

        onValue(ref(db, `${BASE_PATH}/lives`), snap => {
            const units = snap.val() || {};
            for(let id in units) {
                if(id === myUID) continue;
                if(otherMarkers[id]) { otherMarkers[id].setLatLng([units[id].lat, units[id].lon]); }
                else {
                    otherMarkers[id] = L.circleMarker([units[id].lat, units[id].lon], { radius: 5, color: 'var(--neon)' })
                        .addTo(map).bindTooltip(units[id].n, { permanent: true, className: 'tactical-label' });
                }
            }
        });

        onChildAdded(ref(db, `${BASE_PATH}/msgs`), s => {
            const d = s.val();
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${d.m.includes('MAYDAY') ? 'mayday' : ''}`;
            div.innerHTML = `<b>${d.n}</b>${d.m}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });
    }

    function checkZones(lat, lon) {
        let userPos = L.latLng(lat, lon);
        let activeName = "OUT OF RANGE";
        
        zoneVisuals.forEach(zone => {
            let dist = userPos.distanceTo([zone.lat, zone.lon]);
            if(dist <= 300) {
                zone.circle.setStyle({ fillOpacity: 0.4, color: 'var(--danger)', weight: 2 });
                activeName = zone.name;
            } else {
                zone.circle.setStyle({ fillOpacity: 0.1, color: 'var(--neon)', weight: 1 });
            }
        });
        document.getElementById('street-name').innerText = activeName;
    }

    window.sendMsg = () => {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        push(ref(db, `${BASE_PATH}/msgs`), { n: myNick, m: input.value });
        input.value = '';
    };

    window.sos = () => {
        push(ref(db, `${BASE_PATH}/msgs`), { n: "🚨 " + myNick, m: "!!! MAYDAY - WITHIN RANGE !!!" });
    };

    window.access = async mode => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const n = document.getElementById('nick').value;
        try {
            if(mode === 'reg') {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await updateProfile(res.user, { displayName: n });
                location.reload();
            } else { await signInWithEmailAndPassword(auth, e, p); }
        } catch(err) { alert(err.message); }
    };
</script>
</body>
</html>
